services:
  orchestrator:
    image: ghcr.io/jjsmackay/flipsync/orchestrator:latest
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    volumes:
      - ${DATA_ROOT:-data}:/data
    environment:
      - DATA_DIR=/data
      - VOCAL_SEPARATION_URL=http://vocal-separation:8001
      - DIARISATION_URL=http://diarisation:8002
      - TRANSCRIPTION_URL=http://transcription:8003
      - CLEANUP_URL=http://cleanup:8004
      - XTTS_URL=http://xtts:8005
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      - vocal-separation
      - diarisation
      - transcription
      - cleanup
    restart: unless-stopped
    networks:
      - flipsync

  vocal-separation:
    image: ghcr.io/jjsmackay/flipsync/vocal-separation:latest
    volumes:
      - ${DATA_ROOT:-data}:/data
      - ${MODELS_ROOT:-/mnt/models/flipsync}/demucs:/root/.cache/torch
    environment:
      # Release the Demucs model from VRAM after this many idle seconds so it
      # doesn't squat on GPU memory a later stage needs. 0 disables (stay warm).
      - IDLE_UNLOAD_SECS=${IDLE_UNLOAD_SECS:-60}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipsync

  diarisation:
    image: ghcr.io/jjsmackay/flipsync/diarisation:latest
    volumes:
      - ${DATA_ROOT:-data}:/data
      - ${MODELS_ROOT:-/mnt/models/flipsync}/pyannote:/root/.cache/torch
    environment:
      - HF_TOKEN=${HF_TOKEN}
      # Release the pyannote models from VRAM after this many idle seconds so
      # they don't squat on GPU memory a later stage needs. 0 disables.
      - IDLE_UNLOAD_SECS=${IDLE_UNLOAD_SECS:-60}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipsync

  transcription:
    image: ghcr.io/jjsmackay/flipsync/transcription:latest
    volumes:
      - ${DATA_ROOT:-data}:/data
      - ${MODELS_ROOT:-/mnt/models/flipsync}/whisper:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipsync

  cleanup:
    image: ghcr.io/jjsmackay/flipsync/cleanup:latest
    volumes:
      - ${DATA_ROOT:-data}:/data
    restart: unless-stopped
    networks:
      - flipsync

  # XTTS-v2 fine-tune + synthesis (v1.5). Profile-gated: it only starts with
  # `--profile xtts` because the base stack runs without voice cloning and the
  # image is large. Not in orchestrator depends_on for the same reason — the
  # Models/Previews endpoints degrade to 503 when the container is absent.
  xtts:
    image: ghcr.io/jjsmackay/flipsync/xtts:latest
    profiles: ["xtts"]
    volumes:
      - ./data:/data
      - ${MODELS_ROOT:-/mnt/models/flipsync}/xtts:/root/.local/share/tts
    environment:
      # XTTS-v2 is under the Coqui Public Model License; the service refuses to
      # start until the operator accepts by setting this to 1.
      - XTTS_ACCEPT_CPML=${XTTS_ACCEPT_CPML:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipsync

  frontend:
    image: ghcr.io/jjsmackay/flipsync/frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Caddy serves the built UI and proxies the same-origin /api path here —
      # no public orchestrator port or CORS needed for the UI. Caddy streams
      # request bodies uncapped, so large source uploads pass straight through.
      - ORCHESTRATOR_PROXY_TARGET=http://orchestrator:8000
    depends_on:
      - orchestrator
    restart: unless-stopped
    networks:
      - flipsync

networks:
  flipsync:
    driver: bridge

volumes:
  # Project data (SQLite DBs, extracted audio, segments, exports). A named
  # volume by default so it lives outside the compose working directory and
  # survives compose down / a deploy tool re-cloning its stack dir. Override
  # with DATA_ROOT to bind-mount a host path instead (e.g. ./data for local
  # dev, or an absolute path). Unused when DATA_ROOT is set.
  data:
