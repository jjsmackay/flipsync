services:
  orchestrator:
    image: ghcr.io/jjsmackay/flipsync/orchestrator:latest
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - VOCAL_SEPARATION_URL=http://vocal-separation:8001
      - DIARISATION_URL=http://diarisation:8002
      - TRANSCRIPTION_URL=http://transcription:8003
      - CLEANUP_URL=http://cleanup:8004
    depends_on:
      - vocal-separation
      - diarisation
      - transcription
      - cleanup
    restart: unless-stopped
    networks:
      - flipsync

  vocal-separation:
    image: ghcr.io/jjsmackay/flipsync/vocal-separation:latest
    volumes:
      - ./data:/data
      - ${MODELS_ROOT:-/mnt/models/flipsync}/demucs:/root/.cache/torch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipsync

  diarisation:
    image: ghcr.io/jjsmackay/flipsync/diarisation:latest
    volumes:
      - ./data:/data
      - ${MODELS_ROOT:-/mnt/models/flipsync}/pyannote:/root/.cache/torch
    environment:
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipsync

  transcription:
    image: ghcr.io/jjsmackay/flipsync/transcription:latest
    volumes:
      - ./data:/data
      - ${MODELS_ROOT:-/mnt/models/flipsync}/whisper:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - flipsync

  cleanup:
    image: ghcr.io/jjsmackay/flipsync/cleanup:latest
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - flipsync

  frontend:
    image: ghcr.io/jjsmackay/flipsync/frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    restart: unless-stopped
    networks:
      - flipsync

networks:
  flipsync:
    driver: bridge
