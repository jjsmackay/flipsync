name: Build and push images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: orchestrator
            context: services/orchestrator
          - service: vocal-separation
            context: services/vocal-separation
          - service: diarisation
            context: services/diarisation
          - service: transcription
            context: services/transcription
          - service: cleanup
            context: services/cleanup
          - service: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/jjsmackay/flipsync/${{ matrix.service }}:latest
            ghcr.io/jjsmackay/flipsync/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
