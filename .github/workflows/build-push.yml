name: Build and push images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: orchestrator
            context: services/orchestrator
          - service: vocal-separation
            context: services/vocal-separation
          - service: diarisation
            context: services/diarisation
          - service: transcription
            context: services/transcription
          - service: cleanup
            context: services/cleanup
          - service: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/jjsmackay/flipsync/${{ matrix.service }}:latest
            ghcr.io/jjsmackay/flipsync/${{ matrix.service }}:${{ github.sha }}
          # transcription pulls a large CUDA base image; registry cache has no
          # 10 GB/repo cap (unlike type=gha) and its layers dedupe on pull, so
          # it caches better than GHA here. Other services stay on GHA cache.
          cache-from: ${{ matrix.service == 'transcription' && format('type=registry,ref=ghcr.io/jjsmackay/flipsync/{0}:buildcache', matrix.service) || format('type=gha,scope={0}', matrix.service) }}
          cache-to: ${{ matrix.service == 'transcription' && format('type=registry,ref=ghcr.io/jjsmackay/flipsync/{0}:buildcache,mode=max', matrix.service) || format('type=gha,mode=max,scope={0}', matrix.service) }}
